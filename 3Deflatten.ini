; 3Deflatten default configuration
; This file is read by the filter on startup and written back when you change
; settings via the property page or SetConfig().
;
; convergence  [0.0 – 1.0]   Depth at which left/right views converge (screen plane).
;                              0.0 = far plane, 1.0 = near plane. Default: 0.5
; separation   [0.0 – 0.20]  Stereo strength. Higher = more 3D but more ghosting.
;                              Default: 0.03
; depthSmooth  [0.0 – 1.0]   Temporal smoothing.  0 = off, 1 = fully locked.
;                              Default: 0.4
; outputMode   0 = Side-by-Side (SBS), 1 = Top-and-Bottom (TAB). Default: 0
; gpuProvider  0=Auto  1=TensorRT  2=CUDA  3=DirectML  4=CPU.    Default: 0
; flipDepth    0 = normal,  1 = invert depth polarity.            Default: 0
; modelPath    Full path to the .onnx depth model file.
;              Leave blank to auto-detect from the filter folder.
;              Override with env var DEFLATTEN_MODEL_PATH.

[3Deflatten]
convergence=0.25
separation=0.04
depthSmooth=0
outputMode=0
gpuProvider=0
flipDepth=0
modelPath=
