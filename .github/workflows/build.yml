name: Build

env:
  GH_TOKEN: ${{github.token}}
  Branch: ${{github.ref_name}}
  Title: ${{github.event.repository.name}}
  CUDA_VERSION_MAJOR: "12"
  CUDA_VERSION_MINOR: "9"
  CUDA_VERSION_PATCH: "1"
  CUDA_DRIVER_VERSION: "576.57"
  TENSORRT_VERSION_MAJOR: "10"
  TENSORRT_VERSION_MINOR: "16"
  TENSORRT_VERSION_PATCH: "0"
  TENSORRT_VERSION_BUILD: "72"
  TENSORRT_RTX_VERSION_MAJOR: "1"
  TENSORRT_RTX_VERSION_MINOR: "4"
  TENSORRT_RTX_VERSION_PATCH: "0"
  TENSORRT_RTX_VERSION_BUILD: "76"
  
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── DirectML backend (DirectML + CPU) ──────────────────────────────
          # Works on any DX12 GPU (AMD / Intel / NVIDIA).
          # Produces: Win64/3Deflatten_x64.ax + onnxruntime.dll + directml.dll
#          - name:           "x64 DirectML"
#            arch:           x64
#            cmake_arch:     x64
#            vcpkg_triplet:  x64-windows
#            ort_backend:    DirectML
#            ax_dir:         Win64
#            artifact_name:  3Deflatten_x64_DirectML

          # ── DirectML backend – 32-bit (for 32-bit player hosts) ────────────
          # CUDA/TRT are x64-only; x86 always uses DirectML or CPU.
#          - name:           "x86 DirectML"
#            arch:           x86
#            cmake_arch:     Win32
#            vcpkg_triplet:  x86-windows
#            ort_backend:    DirectML
#            ax_dir:         Win32
#            artifact_name:  3Deflatten_x86_DirectML

          # ── GPU backend (TensorRT + CUDA + CPU) ────────────────────────────
          # NVIDIA only.  Requires CUDA runtime + (optionally) TensorRT SDK
          # installed on the user's machine at runtime.
          # The build itself needs NO CUDA/TRT – only ORT headers + stubs.
          # Produces: Win64_GPU/3Deflatten_x64.ax + onnxruntime.dll
          #         + onnxruntime_providers_cuda.dll
          #         + onnxruntime_providers_tensorrt.dll
          #         + onnxruntime_providers_shared.dll
#          - name:           "x64 GPU (TensorRT+CUDA)"
#            arch:           x64
#            cmake_arch:     x64
#            vcpkg_triplet:  x64-windows
#            ort_backend:    GPU13
#            ax_dir:         Win64_GPU
#            artifact_name:  3Deflatten_x64_GPU

          - name:           "x64 Unified"
            arch:           x64
            cmake_arch:     x64
            vcpkg_triplet:  x64-windows
            ort_backend:    Unified
            ax_dir:         Win64_Unified
            artifact_name:  3Deflatten_x64_Unified

    env:
      VCPKG_ROOT:            C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_INSTALLED_DIR:   ${{ github.workspace }}\vcpkg_installed
      VCPKG_BINARY_SOURCES:  "clear;x-gha,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Actions cache vars for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',     process.env.ACTIONS_CACHE_URL     || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # FetchContent cache: ORT NuGet/zip + strmbase git clone.
      # Keyed on CMakeLists hash so it invalidates when ORT version changes.
      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\build\_deps
          key:  fetchcontent-${{ matrix.ort_backend }}-${{ matrix.arch }}-${{ hashFiles('CMakeLists.txt') }}
          save-always: true

      # vcpkg cache (currently only directxtk)
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg_installed
          key:  vcpkg-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.vcpkg_triplet }}-
          save-always: true

      - name: Install vcpkg dependencies
        run: >
          C:\vcpkg\vcpkg.exe install
          --triplet ${{ matrix.vcpkg_triplet }}
          --no-print-usage
          --x-install-root="${{ github.workspace }}\vcpkg_installed"
        shell: cmd
        working-directory: ${{ github.workspace }}

      - name: Set up MSVC (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Get Visual Studio path
        run: |
          vswhere.exe -property installationPath
          echo "VS_PATH=$(vswhere.exe -property installationPath)" >> $env:GITHUB_ENV
      - name: Cache CUDA
        id: cache-cuda
        uses: actions/cache@v5
        with:
          path: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}"
          key: CUDA_V${{env.CUDA_VERSION_MAJOR}}_${{env.CUDA_VERSION_MINOR}}
      - name: Download CUDA
        if: steps.cache-cuda.outputs.cache-hit != 'true'
        run: |
          curl --ssl-revoke-best-effort --fail -L "https://developer.download.nvidia.com/compute/cuda/${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}.${{env.CUDA_VERSION_PATCH}}/local_installers/cuda_${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}.${{env.CUDA_VERSION_PATCH}}_${{env.CUDA_DRIVER_VERSION}}_windows.exe" -o "CUDA.exe" || true
          curl --ssl-revoke-best-effort --fail -L "https://developer.download.nvidia.com/compute/cuda/${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}.${{env.CUDA_VERSION_PATCH}}/local_installers/cuda_${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}.${{env.CUDA_VERSION_PATCH}}_windows.exe" -o "CUDA.exe" || true
      - name: Install CUDA
        if: steps.cache-cuda.outputs.cache-hit != 'true'
        run: |
          Start-Process -Wait "CUDA.exe" -ArgumentList "-s"
      - name: Set CUDA path
        run: |
          echo "CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}" >> $env:GITHUB_ENV
          echo "CUDA_PATH_V${{env.CUDA_VERSION_MAJOR}}_${{env.CUDA_VERSION_MINOR}}=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}" >> $env:GITHUB_ENV
          echo "CUDA_HOME=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}" >> $env:GITHUB_ENV
          echo "PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}\bin;C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}\bin\x64;$Env:Path" >> $env:GITHUB_ENV
      - name: CUDA Visual Studio integration
        if: steps.cache-cuda.outputs.cache-hit != 'false'
        run: |
          copy "${{env.CUDA_PATH}}\extras\visual_studio_integration\MSBuildExtensions\*" "${{env.VS_PATH}}\MSBuild\Microsoft\VC\v160\BuildCustomizations"
          copy "${{env.CUDA_PATH}}\extras\visual_studio_integration\MSBuildExtensions\*" "${{env.VS_PATH}}\MSBuild\Microsoft\VC\v170\BuildCustomizations"
      - name: List CUDA Visual Studio integration files
        run: |
          ls -R "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}\extras\visual_studio_integration\MSBuildExtensions"
          ls -R "${{env.VS_PATH}}\MSBuild\Microsoft\VC\v160\BuildCustomizations"
          ls -R "${{env.VS_PATH}}\MSBuild\Microsoft\VC\v170\BuildCustomizations"
#      - name: Cache cuDNN
#        id: cache-cudnn
#        uses: actions/cache@v5
#        with:
#          path: "C:\\Program Files\\NVIDIA\\CUDNN\\v9.20"
#          key: CUDNN_V9_20
#      - name: Download cuDNN
#        if: steps.cache-cudnn.outputs.cache-hit != 'true'
#        run: |
#          curl --ssl-revoke-best-effort -L "https://developer.download.nvidia.com/compute/cudnn/9.20.0/local_installers/cudnn_9.20.0_windows_x86_64.exe" -o "cuDNN.exe"
#      - name: Install cuDNN
#        if: steps.cache-cudnn.outputs.cache-hit != 'true'
#        run: |
#          Start-Process -Wait "cuDNN.exe" -ArgumentList "-s"
#      - name: Set cuDNN path
#        run: |
#          echo "CUDNN_PATH=C:\Program Files\NVIDIA\CUDNN\v9.20" >> $env:GITHUB_ENV
#          echo "CUDNN_HOME=C:\Program Files\NVIDIA\CUDNN\v9.20" >> $env:GITHUB_ENV
#          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\NVIDIA\CUDNN\v9.20\bin\${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}\x64"
#          echo "PATH=$Env:Path" >> $env:GITHUB_ENV
#      - name: Download TensorRT
#        run: |
#          curl --ssl-revoke-best-effort --create-dirs -L "https://developer.download.nvidia.com/compute/machine-learning/tensorrt/${{env.TENSORRT_VERSION_MAJOR}}.${{env.TENSORRT_VERSION_MINOR}}.${{env.TENSORRT_VERSION_PATCH}}/zip/TensorRT-${{env.TENSORRT_VERSION_MAJOR}}.${{env.TENSORRT_VERSION_MINOR}}.${{env.TENSORRT_VERSION_PATCH}}.${{env.TENSORRT_VERSION_BUILD}}.Windows.amd64.cuda-${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}.zip" -o "TensorRT.zip" || true
#          7z x "TensorRT.zip"
#          Add-Content -Path $env:GITHUB_PATH -Value "${{github.workspace}}\TensorRT-${{env.TENSORRT_VERSION_MAJOR}}.${{env.TENSORRT_VERSION_MINOR}}.${{env.TENSORRT_VERSION_PATCH}}.${{env.TENSORRT_VERSION_BUILD}}\bin"
#      - name: Download TensorRT RTX
#        run: |
#          curl --ssl-revoke-best-effort --fail --create-dirs -L "https://developer.nvidia.com/downloads/trt/rtx_sdk/secure/${{env.TENSORRT_RTX_VERSION_MAJOR}}.${{env.TENSORRT_RTX_VERSION_MINOR}}/TensorRT-RTX-${{env.TENSORRT_RTX_VERSION_MAJOR}}.${{env.TENSORRT_RTX_VERSION_MINOR}}.${{env.TENSORRT_RTX_VERSION_PATCH}}.${{env.TENSORRT_RTX_VERSION_BUILD}}.Windows.win10.cuda-${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}.zip" -o "TensorRT-RTX.zip" || true
#          curl --ssl-revoke-best-effort --fail --create-dirs -L "https://developer.nvidia.com/downloads/trt/rtx_sdk/secure/${{env.TENSORRT_RTX_VERSION_MAJOR}}.${{env.TENSORRT_RTX_VERSION_MINOR}}/TensorRT-RTX-${{env.TENSORRT_RTX_VERSION_MAJOR}}.${{env.TENSORRT_RTX_VERSION_MINOR}}.${{env.TENSORRT_RTX_VERSION_PATCH}}.${{env.TENSORRT_RTX_VERSION_BUILD}}-Windows-amd64-cuda-${{env.CUDA_VERSION_MAJOR}}.${{env.CUDA_VERSION_MINOR}}-Release-external.zip" -o "TensorRT-RTX.zip" || true
#          7z x "TensorRT-RTX.zip"
#          Add-Content -Path $env:GITHUB_PATH -Value "${{github.workspace}}\TensorRT-RTX-${{env.TENSORRT_RTX_VERSION_MAJOR}}.${{env.TENSORRT_RTX_VERSION_MINOR}}.${{env.TENSORRT_RTX_VERSION_PATCH}}.${{env.TENSORRT_RTX_VERSION_BUILD}}\lib"

      - name: Download onnxruntime
        run: |
          curl --ssl-revoke-best-effort --create-dirs -L "https://github.com/ThreeDeeJay/onnxruntime/releases/download/TensorRT-RTX-75/onnxruntime.zip" -o "onnxruntime.zip"
          git clone https://github.com/ThreeDeeJay/onnxruntime --branch multi-ep --depth 1
          7z x "onnxruntime.zip"
          move "Win64" "onnxruntime\lib"

      - name: Configure CMake
        run: >
          cmake -B build
          -A ${{ matrix.cmake_arch }}
          -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}
          "-DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed"
          -DCMAKE_BUILD_TYPE=Release
          -DORT_BACKEND=${{ matrix.ort_backend }}
          -DORT_UNIFIED_DIR="${{github.workspace}}\onnxruntime"
        shell: cmd

"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.9\include\cuda_runtime.h"


      - name: Build
        run: cmake --build build --config Release --parallel
        shell: cmd

      # Upload the entire output directory (includes all runtime DLLs).
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/${{ matrix.ax_dir }}/
          if-no-files-found: error

  Release:
    name: Release
    runs-on: windows-latest
    needs: build
    steps:

      - name: Clone repo and submodules
        run: git clone https://${{github.repository_owner}}:${{github.token}}@github.com/${{github.repository}}.git "${{github.workspace}}" --branch ${{env.Branch}} --recurse-submodules

      - name: Get current date, commit hash and count
        run: |
          echo "FirstCommitHash=$(git rev-list --max-parents=0 HEAD --first-parent)" >> $env:GITHUB_ENV
          echo "CommitHash=$(git rev-parse HEAD)" >> $env:GITHUB_ENV
          echo "CommitHashShort=$(git rev-parse --short=7 HEAD)" >> $env:GITHUB_ENV
          echo "CommitCount=$(git rev-list --count HEAD)" >> $env:GITHUB_ENV
          echo "CommitDate=$(git show -s --date=format:'%Y-%m-%d' --format=%cd)" >> $env:GITHUB_ENV

#      - name: Download x86 DirectML
#        uses: actions/download-artifact@v4
#        with:
#          name: 3Deflatten_x86_DirectML
#          path: Release\Win32

#      - name: Download x64 DirectML
#        uses: actions/download-artifact@v4
#        with:
#          name: 3Deflatten_x64_DirectML
#          path: Release\Win64
#
#      - name: Download x64 GPU (TensorRT+CUDA)
#        uses: actions/download-artifact@v4
#        with:
#          name: 3Deflatten_x64_GPU
#          path: Release\Win64_GPU

      - name: Download x64 Unified
        uses: actions/download-artifact@v4
        with:
          name: 3Deflatten_x64_Unified
          path: Release\Win64_Unified

      - name: Deploy
        run: |
          copy "3Deflatten.ini"                          "Release/Win64_Unified/"
          copy "README.md"                               "Release/ReadMe.txt"
          copy "LICENSE"                                 "Release/License.txt"
          copy "scripts/register.bat"                    "Release/"
          copy "scripts/unregister.bat"                  "Release/"
          copy "scripts/Setup.py"                        "Release/"
          copy "scripts/collect_runtime_dlls.py"         "Release/"
          copy "scripts/collect_runtime_dlls_cuda12.py"  "Release/"
          copy "scripts/collect_runtime_dlls_cuda13.py"  "Release/"
#copy "3Deflatten.ini"                          "Release/Win64/"
#copy "3Deflatten.ini"                          "Release/Win64_GPU/"
#copy "3Deflatten.ini"                   "Release/Win32/"
#copy -r "Artifacts/Win64"               "Release"
#copy -r "Artifacts/Win64_GPU"           "Release"
#copy -r "Artifacts/Win32"               "Release"

  
      - name: Compress artifacts
        if: github.event_name == 'push'
        run: |
          7z a "Release/${{env.Title}}.zip" "${{github.workspace}}/Release/*" -mx=9
          cp "Release/${{env.Title}}.zip" "Release/${{env.Title}}_r${{env.CommitCount}}@${{env.CommitHashShort}}.zip"
  
      - name: Purge tag - latest-${{env.Branch}}
        if: github.event_name == 'push'
        run: |
          gh release delete latest-${{env.Branch}} --repo ${{github.repository}} --cleanup-tag --yes || true
  
      - name: Release - archive-${{env.Branch}}
        if: github.event_name == 'push'
        run: |
          gh release create archive-${{env.Branch}} --repo ${{github.repository}} --target ${{env.FirstCommitHash}} --latest=false --prerelease --title "${{env.Title}} ${{env.Branch}} build archive" --notes "Latest build: https://github.com/${{github.repository}}/releases/latest-${{env.Branch}}
          Build logs: https://github.com/${{github.repository}}/actions" || true
          gh release edit archive-${{env.Branch}} --repo ${{github.repository}} --target ${{env.FirstCommitHash}} --latest=false --prerelease --title "${{env.Title}} ${{env.Branch}} build archive" --notes "Latest build: https://github.com/${{github.repository}}/releases/latest-${{env.Branch}}
          Build logs: https://github.com/${{github.repository}}/actions" || true
          gh release upload archive-${{env.Branch}} --repo ${{github.repository}} --clobber "Release/${{env.Title}}_r${{env.CommitCount}}@${{env.CommitHashShort}}.zip"
  
      - name: Release - latest-${{env.Branch}}
        if: github.event_name == 'push'
        run: |
          gh release create latest-${{env.Branch}} --repo ${{github.repository}} --target ${{env.CommitHash}} --generate-notes --latest=true --title "${{env.Title}} r${{env.CommitCount}}@${{env.CommitHashShort}}" --notes "Build archive: https://github.com/${{github.repository}}/releases/tag/archive-${{env.Branch}}
          Build log: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}"
          gh release upload latest-${{env.Branch}} --repo ${{github.repository}} --clobber "Release/${{env.Title}}.zip"
