name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        arch:   [ x64, x86 ]
        config: [ Release ]
        include:
          - arch: x64
            cmake_arch:    x64
            vcpkg_triplet: x64-windows
          - arch: x86
            cmake_arch:    Win32
            vcpkg_triplet: x86-windows

    env:
      VCPKG_ROOT:              ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_TRIPLET:   ${{ matrix.vcpkg_triplet }}
      # Binary caching: store built packages in the Actions cache.
      # This is the key that makes subsequent runs take ~3 min instead of ~2 hr.
      VCPKG_BINARY_SOURCES:    "clear;x-gha,readwrite"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Enable vcpkg binary caching via GitHub Actions cache ──────────────
      - name: Export GitHub Actions cache env vars for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',    process.env.ACTIONS_CACHE_URL    || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── 3. Cache the vcpkg install tree by triplet + vcpkg.json hash ─────────
      #    This caches the final installed/ directory so vcpkg skips the build
      #    entirely on cache hit. The key includes a hash of vcpkg.json so it
      #    invalidates automatically when you add/remove dependencies.
      - name: Cache vcpkg installed packages
        id:   vcpkg-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg\installed
          key:  vcpkg-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('vcpkg-configuration.json', '.github/vcpkg-baseline') }}
          restore-keys: |
            vcpkg-${{ matrix.vcpkg_triplet }}-

      # ── 4. Bootstrap vcpkg ───────────────────────────────────────────────────
      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics
        shell: pwsh

      # ── 5. Install vcpkg dependencies ────────────────────────────────────────
      #    Thanks to VCPKG_BINARY_SOURCES=x-gha, packages already built in a
      #    previous run are restored from cache instead of recompiled.
      - name: Install vcpkg dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            onnxruntime:${{ matrix.vcpkg_triplet }} `
            directxtk:${{ matrix.vcpkg_triplet }}
        shell: pwsh
