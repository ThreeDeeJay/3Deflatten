name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        arch:   [ x64, x86 ]
        config: [ Release ]
        include:
          - arch: x64
            cmake_arch:    x64
            vcpkg_triplet: x64-windows
          - arch: x86
            cmake_arch:    Win32
            vcpkg_triplet: x86-windows

    env:
      VCPKG_ROOT:            ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_BINARY_SOURCES:  "clear;x-gha,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Actions cache env vars for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',     process.env.ACTIONS_CACHE_URL     || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg\installed
          key:  vcpkg-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.vcpkg_triplet }}-

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics
        shell: pwsh

      # IMPORTANT: vcpkg.json puts vcpkg in manifest mode.
      # In manifest mode, `vcpkg install` reads vcpkg.json automatically.
      # Passing individual package names on the command line is an error.
      # VCPKG_BINARY_SOURCES=x-gha restores pre-built packages from the
      # Actions cache, making subsequent runs take ~3 min instead of ~2 hrs.
      - name: Install vcpkg dependencies
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            --triplet ${{ matrix.vcpkg_triplet }} `
            --no-print-usage
        shell: pwsh
        working-directory: ${{ github.workspace }}

      - name: Set up MSVC (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure CMake (${{ matrix.arch }})
        run: |
          cmake -B build `
            -A ${{ matrix.cmake_arch }} `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            "-DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}" `
            -DCMAKE_BUILD_TYPE=${{ matrix.config }}
        shell: pwsh

      - name: Build (${{ matrix.arch }})
        run: cmake --build build --config ${{ matrix.config }} --parallel
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3Deflatten_${{ matrix.arch }}_${{ matrix.config }}
          path: build/${{ matrix.config }}/3Deflatten_${{ matrix.arch }}.ax
          if-no-files-found: error

  package:
    name: Package release
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: 3Deflatten_x64_Release
          path: release/

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: 3Deflatten_x86_Release
          path: release/

      - name: Create release zip
        run: |
          Copy-Item README.md                 release/
          Copy-Item LICENSE                   release/
          Copy-Item scripts/register.bat      release/
          Copy-Item scripts/download_model.py release/
          Compress-Archive -Path release/* -DestinationPath 3Deflatten-release.zip
        shell: pwsh

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: 3Deflatten-release
          path: 3Deflatten-release.zip
