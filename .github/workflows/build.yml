name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        arch:   [ x64, x86 ]
        config: [ Release ]
        include:
          - arch: x64
            cmake_arch:    x64
            vcpkg_triplet: x64-windows
          - arch: x86
            cmake_arch:    Win32
            vcpkg_triplet: x86-windows

    env:
      # Use the vcpkg that is pre-installed on every windows-latest runner.
      # VCPKG_INSTALLATION_ROOT is set by the runner to its location
      # (typically C:\vcpkg).  No cloning or bootstrapping needed.
      VCPKG_ROOT:            ${{ env.VCPKG_INSTALLATION_ROOT }}
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
      # Use the GitHub Actions cache as vcpkg's binary source so pre-built
      # packages are restored on subsequent runs instead of recompiled.
      VCPKG_BINARY_SOURCES:  "clear;x-gha,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Expose the cache URL/token that vcpkg's x-gha binary source needs.
      - name: Export Actions cache env vars for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',     process.env.ACTIONS_CACHE_URL     || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Cache the installed/ directory by triplet + vcpkg.json hash.
      # On a hit the install step below completes in seconds.
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed
          key:  vcpkg-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.vcpkg_triplet }}-

      # vcpkg.json puts vcpkg in manifest mode: `vcpkg install` reads the
      # manifest automatically -- no package names on the command line.
      - name: Install vcpkg dependencies
        run: vcpkg install --triplet ${{ matrix.vcpkg_triplet }} --no-print-usage
        shell: cmd
        working-directory: ${{ github.workspace }}

      - name: Set up MSVC (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure CMake (${{ matrix.arch }})
        run: >
          cmake -B build
          -A ${{ matrix.cmake_arch }}
          -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
        shell: cmd

      - name: Build (${{ matrix.arch }})
        run: cmake --build build --config ${{ matrix.config }} --parallel
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3Deflatten_${{ matrix.arch }}_${{ matrix.config }}
          path: build/${{ matrix.config }}/3Deflatten_${{ matrix.arch }}.ax
          if-no-files-found: error

  package:
    name: Package release
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: 3Deflatten_x64_Release
          path: release/

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: 3Deflatten_x86_Release
          path: release/

      - name: Create release zip
        run: |
          copy README.md                 release\
          copy LICENSE                   release\
          copy scripts\register.bat      release\
          copy scripts\download_model.py release\
          powershell Compress-Archive -Path release\* -DestinationPath 3Deflatten-release.zip
        shell: cmd

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: 3Deflatten-release
          path: 3Deflatten-release.zip
