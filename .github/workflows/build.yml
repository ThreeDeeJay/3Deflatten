name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        arch:   [ x64, x86 ]
        config: [ Release ]
        include:
          - arch: x64
            cmake_arch:    x64
            vcpkg_triplet: x64-windows
          - arch: x86
            cmake_arch:    Win32
            vcpkg_triplet: x86-windows

    env:
      # C:\vcpkg is the fixed location of the pre-installed vcpkg on
      # windows-latest runners. VCPKG_INSTALLATION_ROOT cannot be referenced
      # here because the env context is not available in job-level env blocks.
      VCPKG_ROOT:            C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
      # Use the GitHub Actions cache as vcpkg's binary source so pre-built
      # packages are restored on subsequent runs instead of recompiled.
      VCPKG_BINARY_SOURCES:  "clear;x-gha,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Expose the cache URL/token that vcpkg's x-gha binary source needs.
      - name: Export Actions cache env vars for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',     process.env.ACTIONS_CACHE_URL     || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Cache the installed/ directory by triplet + vcpkg.json hash.
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key:  vcpkg-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.vcpkg_triplet }}-

      # vcpkg.json puts vcpkg in manifest mode: `vcpkg install` reads the
      # manifest automatically -- no package names on the command line.
      - name: Install vcpkg dependencies
        run: vcpkg install --triplet ${{ matrix.vcpkg_triplet }} --no-print-usage
        shell: cmd
        working-directory: ${{ github.workspace }}

      - name: Set up MSVC (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure CMake (${{ matrix.arch }})
        run: >
          cmake -B build
          -A ${{ matrix.cmake_arch }}
          -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
        shell: cmd
