name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        arch:   [ x64, x86 ]
        config: [ Release ]
        include:
          - arch: x64
            cmake_arch:    x64
            vcpkg_triplet: x64-windows
            ax_dir:        Win64
          - arch: x86
            cmake_arch:    Win32
            vcpkg_triplet: x86-windows
            ax_dir:        Win32

    env:
      VCPKG_ROOT:            C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
      # In manifest mode vcpkg installs packages to <source>/vcpkg_installed/
      # (not C:\vcpkg\installed).  Pin this to a known path so we can cache it.
      VCPKG_INSTALLED_DIR:   ${{ github.workspace }}\vcpkg_installed
      # Use the GitHub Actions cache as vcpkg's binary source.
      VCPKG_BINARY_SOURCES:  "clear;x-gha,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Actions cache env vars for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',     process.env.ACTIONS_CACHE_URL     || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Cache FetchContent downloads: ORT DirectML NuGet + strmbase git clone.
      # Key is the CMakeLists hash so it invalidates when dependencies change.
      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\build\_deps
          key: fetchcontent-${{ matrix.arch }}-${{ hashFiles('CMakeLists.txt') }}
          save-always: true

      # Cache the manifest-mode install dir.
      # save-always: true ensures the cache is written even when a later step
      # fails, so the next run benefits from whatever was downloaded this run.
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg_installed
          key:  vcpkg-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.vcpkg_triplet }}-
          save-always: true

      # Manifest mode: `vcpkg install` reads vcpkg.json -- no package args.
      # VCPKG_INSTALLED_DIR is passed so vcpkg writes to our cached path.
      - name: Install vcpkg dependencies
        run: >
          C:\vcpkg\vcpkg.exe install
          --triplet ${{ matrix.vcpkg_triplet }}
          --no-print-usage
          --x-install-root="${{ github.workspace }}\vcpkg_installed"
        shell: cmd
        working-directory: ${{ github.workspace }}


